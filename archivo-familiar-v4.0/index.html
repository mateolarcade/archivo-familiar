<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="REC, catalogo privado de videos protegidos con Google Drive.">
  <title>REC</title>
  <link rel="icon" href="assets/brand/favicon.ico" sizes="any">
  <link rel="icon" href="assets/brand/favicon-32x32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="assets/brand/favicon-16x16.png" sizes="16x16" type="image/png">
  <link rel="apple-touch-icon" href="assets/brand/apple-touch-icon.png">
  <link rel="mask-icon" href="assets/brand/mask-icon.svg" color="#000000">
  <link rel="manifest" href="assets/brand/site.webmanifest">
  <meta name="msapplication-config" content="assets/brand/browserconfig.xml">
  <meta name="theme-color" content="#000000">
  <link rel="preconnect" href="https://drive.google.com">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="brand.css">
  <script src="data/movies.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body data-page="home">
  <main id="intro-screen" class="intro-screen" aria-label="Presentacion REC">
    <div class="intro-logo intro-sequence-logo" aria-hidden="true">
      <svg class="intro-rec-mark" viewBox="0 0 1024 1024" role="img">
        <path class="intro-rec-ring" pathLength="1000" d="M760 245 A320 320 0 1 0 760 779" />
        <text class="intro-rec-text" x="500" y="565" text-anchor="middle">REC</text>
        <circle class="intro-rec-dot" cx="760" cy="512" r="42" />
      </svg>
    </div>
  </main>
  <section id="password-screen" class="password-screen is-hidden" aria-labelledby="password-title">
    <div class="password-panel">
      <a class="brand password-brand" href="index.html" aria-label="REC"><img src="assets/brand/logo.svg" alt=""></a>
      <p class="eyebrow">Acceso REC</p>
      <h1 id="password-title">Ingresa la contraseña de REC</h1>
      <form id="password-form" class="password-form">
        <label for="family-password">Contraseña</label>
        <div class="password-row">
          <div class="password-field">
            <input id="family-password" type="password" autocomplete="current-password" aria-describedby="password-message" required>
            <button id="password-toggle" class="password-toggle" type="button" aria-label="Mostrar contraseña" aria-pressed="false"><svg class="password-toggle-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 12s3.5-5.5 9.5-5.5 9.5 5.5 9.5 5.5-3.5 5.5-9.5 5.5S2.5 12 2.5 12Z"></path><circle cx="12" cy="12" r="2.7"></circle></svg></button>
          </div>
          <button id="password-submit" type="submit">Entrar</button>
        </div>
      </form>
      <p id="password-message" class="password-message" aria-live="polite"></p>
      <button id="password-retry" class="secondary-button is-hidden" type="button">Ya tengo la contraseña</button>
    </div>
  </section>
  <section id="catalog-screen" class="catalog-screen is-hidden">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Ir al catalogo"><img src="assets/brand/logo.svg" alt=""></a>
      <form id="search-form" class="search-form" role="search">
        <input id="search-input" type="search" placeholder="Buscar por titulo, lugar, personas o categoria" aria-label="Buscar contenido">
        <button type="submit">Buscar</button>
      </form>
    </header>
    <section class="featured" aria-labelledby="featured-title">
      <div class="featured-copy">
        <p class="eyebrow">REC privado</p>
        <h1 id="featured-title">Recuerdos para volver a mirar</h1>
      </div>
    </section>
    <section class="catalog-area" aria-labelledby="catalog-title">
      <div class="section-heading"><div><p class="eyebrow">Catalogo</p><h2 id="catalog-title">Videos disponibles</h2></div><p id="results-count" class="results-count"></p></div>
      <div id="movie-grid" class="movie-grid" aria-live="polite"></div>
      <div id="empty-state" class="empty-state is-hidden"><h3>No se encontraron resultados</h3><p>Proba con otro titulo, lugar, persona, categoria o palabra de la descripcion.</p></div>
    </section>
  </section>
</body>
</html>
